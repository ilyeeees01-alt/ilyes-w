<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم إرسال طلبك | درّة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400..700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #23111f;
    --bg-card: #35192f;
    --gold: #c9a227;
    --gold-light: #f0d372;
    --ruby: #d6396f;
    --emerald: #22a575;
    --cream: #f7ead8;
    --muted: #cbb3ae;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(circle at 15% 20%, rgba(214,57,111,0.18), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(58,107,214,0.16), transparent 42%),
      radial-gradient(circle at 75% 80%, rgba(34,165,117,0.15), transparent 45%),
      var(--bg);
    color: var(--cream);
    font-family: 'Tajawal', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding: 24px;
  }
  .card{
    background: var(--bg-card);
    border: 1px solid rgba(201,162,39,0.25);
    border-radius: 24px;
    padding: 50px 40px;
    max-width: 460px;
    width: 100%;
    text-align:center;
    box-shadow: 0 24px 50px rgba(0,0,0,0.4);
  }
  .icon{
    width: 78px; height:78px; border-radius:50%;
    background: linear-gradient(135deg, var(--emerald), #17624a);
    display:flex; align-items:center; justify-content:center;
    font-size: 2.4rem; color:#fff; margin: 0 auto 26px;
  }
  h1{
    font-family: 'Reem Kufi', sans-serif;
    font-size: 1.6rem;
    color: var(--gold-light);
    margin-bottom: 14px;
  }
  p{ color: var(--muted); line-height: 1.9; margin-bottom: 30px; }
  a.btn{
    display:inline-block;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: #241016; font-weight:900; padding: 14px 30px; border-radius: 999px;
    text-decoration:none;
    box-shadow: 0 10px 24px rgba(201,162,39,0.35);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>تم إرسال طلبك بنجاح</h1>
    <p>شكرًا ليك! وصلنا طلبك وغادي نتواصلو معاك قريبًا عبر رقم الهاتف اللي عطيتينا باش نأكدو التوصيل.</p>
    <a class="btn" href="https://ilyeeees01-alt.github.io/ilyes-w/">العودة للموقع</a>
  </div>
</body>
</html>
